<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>75-Day DSA Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Bebas+Neue&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #181818;
    --border: #222222;
    --border2: #2e2e2e;
    --accent: #39e58c;
    --accent-dim: #1a4d36;
    --accent-glow: rgba(57,229,140,0.12);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #444;
    --done-bg: #0d2b1e;
    --done-border: #39e58c;
    --today-border: #39e58c;
    --red: #e5394a;
    --amber: #e5a839;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(57,229,140,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(57,229,140,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  /* ── HEADER ── */
  .header {
    margin-bottom: 2.5rem;
  }

  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 1.25rem;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .brand-tag {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .brand-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    line-height: 0.88;
    color: var(--text);
    letter-spacing: 1px;
  }

  .brand-title span {
    color: var(--accent);
  }

  .brand-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 6px;
    letter-spacing: 1px;
  }

  /* Progress bar */
  .progress-block {
    margin-top: 0;
    align-self: flex-end;
    text-align: right;
  }

  .progress-pct {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    color: var(--accent);
    line-height: 1;
  }

  .progress-label {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 2px;
    margin-top: 2px;
  }

  .progress-bar-wrap {
    width: 200px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 8px;
    margin-left: auto;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
    box-shadow: 0 0 8px var(--accent);
  }

  /* ── STATS ROW ── */
  .stats-row {
    display: flex;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .stat {
    flex: 1;
    padding: 12px 16px;
    background: var(--surface);
    text-align: center;
  }

  .stat-val {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    display: block;
  }

  .stat-val.green { color: var(--accent); }
  .stat-val.amber { color: var(--amber); }
  .stat-val.red   { color: var(--red); }

  .stat-lbl {
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
    display: block;
  }

  /* ── STREAK ── */
  .streak-banner {
    background: var(--done-bg);
    border: 1px solid var(--accent-dim);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.5rem;
    display: none;
  }

  .streak-banner.visible { display: flex; }

  .streak-icon {
    font-size: 22px;
    flex-shrink: 0;
  }

  .streak-msg {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }

  .streak-sub {
    font-size: 10px;
    color: var(--text2);
    margin-top: 2px;
    letter-spacing: 1px;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
    align-items: center;
  }

  .filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 7px 16px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  .spacer { flex: 1; }

  .reset-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 6px 12px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
  }

  .reset-btn:hover {
    border-color: var(--red);
    color: var(--red);
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
    gap: 6px;
  }

  .day-card {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 10px 10px;
    background: var(--surface);
    cursor: pointer;
    position: relative;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    overflow: hidden;
    min-height: 72px;
  }

  .day-card:hover {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateY(-2px);
  }

  .day-card:active { transform: scale(0.97); }

  .day-card.done {
    background: var(--done-bg);
    border-color: var(--accent-dim);
  }

  .day-card.done:hover {
    border-color: var(--accent);
  }

  .day-card.today-card {
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 1px var(--accent), 0 0 16px var(--accent-glow);
  }

  .day-card.future-card {
    opacity: 0.3;
    cursor: not-allowed;
    pointer-events: none;
  }

  .day-label {
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    display: block;
  }

  .day-card.done .day-label { color: var(--accent-dim); }
  .day-card.done .day-label { color: #1a4d36; }

  .day-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--text);
    line-height: 1;
    display: block;
    margin-top: 1px;
  }

  .day-card.done .day-num { color: var(--accent); }

  .day-topic {
    font-size: 8.5px;
    color: var(--text2);
    margin-top: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 66px;
    display: block;
  }

  .day-card.done .day-topic { color: var(--accent); opacity: 0.7; }

  /* check mark */
  .check {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 16px;
    height: 16px;
    background: var(--accent);
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .day-card.done .check { display: flex; }

  .check::after {
    content: '';
    width: 4px;
    height: 7px;
    border-right: 2px solid #000;
    border-bottom: 2px solid #000;
    transform: rotate(45deg) translate(-1px,-1px);
  }

  /* today pulse ring */
  .today-ring {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.6s infinite;
    display: none;
  }

  .day-card.today-card:not(.done) .today-ring { display: block; }
  .day-card.done .today-ring { display: none; }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(57,229,140,0.6); }
    70%  { box-shadow: 0 0 0 6px rgba(57,229,140,0); }
    100% { box-shadow: 0 0 0 0 rgba(57,229,140,0); }
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-top: 2px solid var(--accent);
    border-radius: 10px;
    padding: 1.5rem;
    width: 100%;
    max-width: 400px;
    position: relative;
  }

  .modal-day-tag {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    color: var(--text);
    line-height: 1;
    margin-bottom: 1rem;
  }

  .modal-label {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }

  .modal-input {
    width: 100%;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 10px 12px;
    border: 1px solid var(--border2);
    border-radius: 5px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    margin-bottom: 1rem;
    transition: border-color 0.15s;
  }

  .modal-input:focus { border-color: var(--accent); }
  .modal-input::placeholder { color: var(--text3); }

  .modal-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn-primary {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 9px 20px;
    border-radius: 5px;
    border: none;
    background: var(--accent);
    color: #000;
    cursor: pointer;
    transition: opacity 0.15s;
    flex: 1;
  }

  .btn-primary:hover { opacity: 0.85; }

  .btn-danger {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 9px 20px;
    border-radius: 5px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--red);
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-danger:hover { border-color: var(--red); background: rgba(229,57,74,0.08); }

  .btn-cancel {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 9px 16px;
    border-radius: 5px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-cancel:hover { border-color: var(--text2); }

  .modal-close {
    position: absolute;
    top: 12px;
    right: 14px;
    background: none;
    border: none;
    color: var(--text3);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    font-family: monospace;
  }

  .modal-close:hover { color: var(--text); }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    gap: 20px;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .legend-box {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .brand-title { font-size: 52px; }
    .progress-pct { font-size: 38px; }
    .progress-bar-wrap { width: 140px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(76px, 1fr)); }
  }
</style>
</head>
<body>

<div class="wrapper">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="brand">
        <span class="brand-tag">// challenge</span>
        <div class="brand-title"><span>75</span>-Day<br>DSA</div>
        <span class="brand-sub">DATA STRUCTURES & ALGORITHMS</span>
      </div>
      <div class="progress-block">
        <div class="progress-pct" id="pct-display">0%</div>
        <div class="progress-label">COMPLETE</div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="prog-bar" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat">
        <span class="stat-val green" id="stat-done">0</span>
        <span class="stat-lbl">Practiced</span>
      </div>
      <div class="stat">
        <span class="stat-val amber" id="stat-streak">0</span>
        <span class="stat-lbl">Streak</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="stat-left">75</span>
        <span class="stat-lbl">Remaining</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="stat-current">—</span>
        <span class="stat-lbl">Current Day</span>
      </div>
    </div>
  </div>

  <!-- STREAK BANNER -->
  <div class="streak-banner" id="streak-banner">
    <div class="streak-icon">🔥</div>
    <div>
      <div class="streak-msg" id="streak-msg">0-day streak!</div>
      <div class="streak-sub">DON'T BREAK THE CHAIN</div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="filter-btn active" id="btn-all" onclick="setFilter('all')">ALL</button>
    <button class="filter-btn" id="btn-done" onclick="setFilter('done')">DONE</button>
    <button class="filter-btn" id="btn-pending" onclick="setFilter('pending')">PENDING</button>
    <div class="spacer"></div>
    <button class="reset-btn" onclick="confirmReset()">RESET ALL</button>
  </div>

  <!-- GRID -->
  <div class="grid" id="grid"></div>

  <!-- LEGEND -->
  <div class="legend">
    <div class="legend-item">
      <div class="legend-box" style="background:#0d2b1e;border:1px solid #39e58c;"></div>
      Practiced
    </div>
    <div class="legend-item">
      <div class="legend-box" style="background:#111;border:1px solid #222;"></div>
      Not yet
    </div>
    <div class="legend-item">
      <div class="legend-box" style="background:transparent;border:1px solid #39e58c;box-shadow:0 0 8px rgba(57,229,140,0.3);"></div>
      Today
    </div>
    <div class="legend-item">
      <div class="legend-box" style="background:#111;border:1px solid #333;opacity:0.4;"></div>
      Future
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-day-tag">// DSA CHALLENGE</div>
    <div class="modal-title" id="modal-title">DAY 1</div>
    <span class="modal-label">Topic practiced (optional)</span>
    <input class="modal-input" id="topic-input" type="text" placeholder="e.g. Arrays, Binary Search, DP..." maxlength="60" />
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'dsa75_v3';
  const TOTAL = 75;
  let filter = 'all';
  let selectedDay = null;

  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return { startDay: 1, days: {} };
  }

  function saveData(d) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {}
  }

  let data = loadData();

  // "current day" = how many days since start (1-indexed), capped at 75
  function getCurrentDay() {
    // We use a simple approach: store the startTimestamp on first use
    if (!data.startTimestamp) {
      data.startTimestamp = Date.now();
      saveData(data);
    }
    const elapsed = Math.floor((Date.now() - data.startTimestamp) / 86400000) + 1;
    return Math.min(Math.max(elapsed, 1), TOTAL);
  }

  function computeStreak() {
    const cur = getCurrentDay();
    let streak = 0;
    for (let i = cur; i >= 1; i--) {
      if (data.days[i] && data.days[i].done) streak++;
      else break;
    }
    return streak;
  }

  function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    const cur = getCurrentDay();
    const streak = computeStreak();
    const doneDays = Object.values(data.days).filter(d => d && d.done).length;
    const remaining = TOTAL - doneDays;
    const pct = Math.round((doneDays / TOTAL) * 100);

    // Stats
    document.getElementById('stat-done').textContent = doneDays;
    document.getElementById('stat-streak').textContent = streak;
    document.getElementById('stat-left').textContent = remaining;
    document.getElementById('stat-current').textContent = 'Day ' + cur;
    document.getElementById('pct-display').textContent = pct + '%';
    document.getElementById('prog-bar').style.width = pct + '%';

    // Streak banner
    const banner = document.getElementById('streak-banner');
    if (streak >= 2) {
      banner.classList.add('visible');
      document.getElementById('streak-msg').textContent = streak + '-day streak!';
    } else {
      banner.classList.remove('visible');
    }

    for (let n = 1; n <= TOTAL; n++) {
      const info = data.days[n] || {};
      const isDone = !!info.done;
      const isFuture = n > cur;
      const isToday = n === cur;

      if (filter === 'done' && !isDone) continue;
      if (filter === 'pending' && isDone) continue;

      const card = document.createElement('div');
      card.className = 'day-card' +
        (isDone ? ' done' : '') +
        (isToday ? ' today-card' : '') +
        (isFuture ? ' future-card' : '');

      card.innerHTML =
        `<span class="day-label">Day</span>` +
        `<span class="day-num">${n}</span>` +
        (info.topic ? `<span class="day-topic">${escHtml(info.topic)}</span>` : '') +
        `<div class="check"></div>` +
        `<div class="today-ring"></div>`;

      if (!isFuture) {
        card.addEventListener('click', () => openModal(n));
      }

      grid.appendChild(card);
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function setFilter(f) {
    filter = f;
    ['all','done','pending'].forEach(k => {
      document.getElementById('btn-' + k).classList.toggle('active', k === f);
    });
    render();
  }

  function openModal(n) {
    selectedDay = n;
    const info = data.days[n] || {};
    document.getElementById('modal-title').textContent = 'DAY ' + n;
    document.getElementById('topic-input').value = info.topic || '';

    const isDone = !!info.done;
    const actions = document.getElementById('modal-actions');

    if (isDone) {
      actions.innerHTML =
        `<button class="btn-danger" onclick="unmarkDay()">UNMARK</button>` +
        `<button class="btn-primary" onclick="saveModal()">UPDATE</button>` +
        `<button class="btn-cancel" onclick="closeModal()">CANCEL</button>`;
    } else {
      actions.innerHTML =
        `<button class="btn-primary" onclick="saveModal()">MARK DONE ✓</button>` +
        `<button class="btn-cancel" onclick="closeModal()">CANCEL</button>`;
    }

    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('topic-input').focus(), 100);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    selectedDay = null;
  }

  function overlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  function saveModal() {
    if (!selectedDay) return;
    const topic = document.getElementById('topic-input').value.trim();
    data.days[selectedDay] = { done: true, topic };
    saveData(data);
    closeModal();
    render();
  }

  function unmarkDay() {
    if (!selectedDay) return;
    const topic = document.getElementById('topic-input').value.trim();
    data.days[selectedDay] = { done: false, topic };
    saveData(data);
    closeModal();
    render();
  }

  function confirmReset() {
    if (confirm('Reset ALL progress? This cannot be undone.')) {
      data.days = {};
      data.startTimestamp = Date.now();
      saveData(data);
      render();
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && selectedDay !== null) saveModal();
  });

  render();
</script>
</body>
</html>
